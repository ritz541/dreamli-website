<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dreamli</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-dark);
            position: relative;
            overflow: hidden;
        }

        .reset-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(225, 29, 72, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .reset-box {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            margin: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .reset-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--gradient);
            border-radius: 16px;
            opacity: 0.1;
            z-index: -1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-dark);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
        }

        .password-requirements {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .btn-reset {
            width: 100%;
            padding: 1rem;
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(225, 29, 72, 0.4);
        }

        .btn-reset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--primary-color);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-box">
            <div class="logo-section">
                <h1>🔥 Dreamli</h1>
                <p>Reset your password</p>
            </div>

            <div id="message" class="message"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your new password" required
                        minlength="6">
                    <div class="password-requirements">
                        At least 6 characters
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Re-enter your new password" required minlength="6">
                </div>

                <button type="submit" class="btn-reset" id="submitBtn">
                    Reset Password
                </button>
            </form>

            <div class="back-link">
                <a href="https://dreamli.app">← Back to Dreamli</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase client
        const supabaseUrl = 'https://xovsaqtnxnjrflrkcvsu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvdnNhcXRueG5qcmZscmtjdnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE3MjM1NzUsImV4cCI6MjA0NzI5OTU3NX0.x5RbOaRfz4GN6YMN_0sFZT6mOlEDJvIlz62z0WOWfE4';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        let hasValidSession = false;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        // Check for hash params on page load and exchange for session
        async function initPasswordRecovery() {
            try {
                // Debug: Log the full URL and hash
                console.log('Full URL:', window.location.href);
                console.log('Hash:', window.location.hash);

                // Check if we're already in a session
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (session) {
                    hasValidSession = true;
                    console.log('Password recovery session active');
                    return;
                }

                // If no session, check URL hash for tokens
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                const type = hashParams.get('type');

                console.log('URL params:', { type, hasAccessToken: !!accessToken, hasRefreshToken: !!refreshToken });

                if (type === 'recovery' && accessToken) {
                    // Set the session using the tokens from the URL
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });

                    if (error) {
                        throw error;
                    }

                    hasValidSession = true;
                    console.log('Password recovery session established');
                    showMessage('Ready to reset password', 'success');
                } else {
                    throw new Error('No recovery tokens found in URL. Make sure you clicked the link from your email.');
                }
            } catch (error) {
                console.error('Error initializing recovery:', error);
                showMessage(error.message || 'Invalid or expired reset link. Please request a new password reset from the app.', 'error');
                submitBtn.disabled = true;
            }
        }

        // Initialize on page load
        initPasswordRecovery(); form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            if (!hasValidSession) {
                showMessage('Auth session missing! Please request a new password reset.', 'error');
                return;
            }

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Resetting Password<span class="loading"></span>';

            try {
                // Update the user's password
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) {
                    throw error;
                }

                // Success!
                showMessage('Password reset successful! You can now login with your new password.', 'success');
                form.reset();

                // Sign out to clear the recovery session
                await supabaseClient.auth.signOut();

                // Redirect to app or home page after 3 seconds
                setTimeout(() => {
                    window.location.href = 'https://dreamli.app';
                }, 3000);

            } catch (error) {
                console.error('Error resetting password:', error);

                let errorMessage = 'Failed to reset password. ';

                if (error.message.includes('expired')) {
                    errorMessage += 'Your reset link has expired. Please request a new one.';
                } else if (error.message.includes('invalid')) {
                    errorMessage += 'Invalid reset link. Please request a new one.';
                } else if (error.message.includes('session')) {
                    errorMessage += 'Auth session missing! Please request a new reset link.';
                } else {
                    errorMessage += error.message || 'Please try again.';
                }

                showMessage(errorMessage, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        // Listen for auth state changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event);
            if (event === 'PASSWORD_RECOVERY') {
                hasValidSession = true;
                console.log('Password recovery session active');
            }
        });
    </script>
</body>

</html>
